appId: com.clilogging.app
productName: CLI Logging
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
win:
  target:
    - nsis
  signAndEditExecutable: false
  signDlls: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
